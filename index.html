<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Design Landing Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <div class="navigation-bar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Case Studies</a></li>
            <li><a href="#">Testimonials</a></li>
            <li><a href="#">Recent Work</a></li>
            <li><a href="#">Get In Touch</a></li>
        </ul>
        <div class="social-icons">
            <img src="images/LinkedIn.svg" alt="LinkedIn">
            <img src="images/Behance.svg" alt="Behance">
            <img src="images/Twitter.svg" alt="Twitter">
        </div>
    </div>

    <!-- Intro -->
    <article class="main-intro">
        <div class="intro">
            <h1>Ryan Veldhuizen</h1>
            <p>Intro text: Lorem ipsum dolor sit amet, consectetur adipiscing elit, 
                sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. </p>
            <button>Let's Get Started<img src="images/Vector.svg" alt="arrow icon"></button>
        </div>
        <img class="pfp" src="images/LinkedinPFP.jpg" alt="portrait-photo">
    </article>
    <!-- Partnerships -->
    <section class="worked-with">
        <div>
            <p>Worked with</p>
        </div>
    </section>
    <footer>
        <div class="partnerships">
            <div class="partnerships-container"><img src="images/clickup logo 1.svg" alt="click-up logo">
            </div>
            <div class="partnerships-container"><img src="images/dropbox_blue 1.svg" alt="dropbox logo">
            </div>
            <div class="partnerships-container"><img src="images/Group.svg" alt="paychex logo">
            </div>
            <div class="partnerships-container"><img src="images/Elastic logo 1.svg" alt="elastic logo">
            </div>
            <div class="partnerships-container"><img src="images/Group(1).svg" alt="stripe logo">
            </div>
            
        </div>
    </footer>
</body>
</html>
