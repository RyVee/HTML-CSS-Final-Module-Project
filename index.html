<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Design Landing Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navigation-bar">
        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
        <ul id="nav-links" class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Case Studies</a></li>
            <li><a href="#">Testimonials</a></li>
            <li><a href="#">Recent Work</a></li>
            <li><a href="#">Get In Touch</a></li>
        </ul>
        <div id="social-icons" class="social-icons">
            <a href="https://www.linkedin.com/in/ryanveld/"><img src="images/LinkedIn.svg" alt="LinkedIn"></a>
            <a href="https://github.com/RyVee"><img src="images/Github-logo.png" alt="Behance"></a>
        </div>
    <!-- JS for hamburger menu -->
        <script>
            function toggleMenu() {
                const  menu= document.getElementById("nav-links");
                menu.classList.toggle("active");
            }
        </script>
    </nav>
   
    <!-- Intro -->
    <article class="main-intro">
        <div class="intro">
            <h1>Ryan Veldhuizen</h1>
            <p>Innovation, integration, determination and results</p>
            <a href="#"><button>Let's Get Started<img src="images/Vector.svg" alt="arrow icon"></button></a>
        </div>
        <img class="pfp" src="images/LinkedinPFP.jpg" alt="portrait-photo">
    </article>
    <!-- Partnerships -->
    <section class="worked-with">
        <div>
            <p>Worked with</p>
        </div>
    </section>
    <footer>
        <div class="partnerships">
            <div class="partnerships-container"><img src="images/Coursera-Logo.png" alt="Coursera logo">
            </div>
            <div class="partnerships-container"><img src="images/EPICemr.png" alt="EPIC logo">
            </div>
            <div class="partnerships-container"><img src="images/MSU-logo.png" alt="MSU logo">
            </div>
            
        </div>
    </footer>
</body>
</html>
